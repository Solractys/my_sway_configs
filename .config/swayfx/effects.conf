# SwayFX effects — fase 5 do roadmap.
# Tudo comentado nesta fase 6 (paridade com sway). Habilitar lote por lote.

### Lote 1 — efeitos de menor risco (cantos + sombras + dimming leve)
corner_radius 8
smart_corner_radius enable
shadows enable
shadow_blur_radius 20
shadow_color #00000080
default_dim_inactive 0.1

### Lote 2 — blur controlado
blur enable
blur_passes 2
blur_radius 5
# blur_xray fica off (default) para o blur só pegar o wallpaper, não janelas atrás
# layer_effects opt-in (ative se quiser blur visível no waybar/launcher transparentes):
# layer_effects "launcher" blur enable; corner_radius 6
# layer_effects "waybar" blur enable; corner_radius 6
# layer_effects "notifications" blur enable; corner_radius 6

### Lote 3 — animações (se a build oferecer)
# animations {
#     enabled yes
#     duration 0.2
# }
